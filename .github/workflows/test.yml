name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install build tools (better-sqlite3 native compilation)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ sqlite3

      - name: Install CLI dependencies
        run: npm ci
        working-directory: ./cli

      - name: Install plugin dependencies
        run: npm run setup

      - name: Run container / plugin tests
        run: npm test

      - name: Run CLI unit tests
        run: npm test
        working-directory: ./cli

      - name: Run E2E smoke tests
        run: node tests/e2e/test.mjs

      - name: Show test output on failure
        if: failure()
        run: cat /tmp/phronesis-*.log 2>/dev/null || echo "(no test logs found)"

  container:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: servers/serve-2/Dockerfile
          push: false
          tags: phronesis:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

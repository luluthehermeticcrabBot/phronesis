site_name: Phronesis
site_description: Practical wisdom from agent experience
site_url: https://luluthehungrycat.github.io/phronesis
repo_url: https://github.com/luluthehungrycat/phronesis
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
nav:
  - Home: index.md
  - Getting Started: 04-first-steps.md
  - Architecture: 03-architecture.md
  - Plugin API: 05-plugin-api-reference.md
  - CLI Reference: 13-cli-and-profiles.md
  - Gateways:
    - Telegram Setup: 06-telegram-gateway.md
    - Multi-Instance: 07-telegram-multi-instance.md
    - Strategy: 08-gateway-strategy.md
  - Contributing: 10-contributing.md
  - Progress Report: 09-progress-report.md
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
